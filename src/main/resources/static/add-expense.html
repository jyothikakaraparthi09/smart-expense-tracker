<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <title>Add Expense</title>
</head>
<body>
<H2>Add Expense</H2>
<div class="container">
<br>
<label>Title: </label><input type="text" id="title"/>
<br>
<label>Amount: </label><input type="text" id="amount"/>
<br>
<label>Category: </label><input type="text" id="category"/>
<br>
<label>Date: </label><input type="date" id="date"/>
<br>
<button onclick="addExpense()">Add Expense</button>

<button onclick="goToDashBoard()">Go To Dashboard</button>

<p id="message"></p>
</div>
<script>

    function goToDashBoard(){
        window.location.href = "/dashboard.html"
    }
    async function addExpense(){
        const token = localStorage.getItem("token");
        const expense = {
            title:document.getElementById("title").value,
            amount:document.getElementById("amount").value,
            category:document.getElementById("category").value,
            date:document.getElementById("date").value
        };

        const response = await fetch("/expenses",{
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer "+token
            },
            body: JSON.stringify(expense)
        });

        if(response.ok){
            document.getElementById("message").innerText = "Expense added successfully!";
        }else{
            document.getElementById("message").innerText = "Failed to add expense";
        }
    }
</script>
</body>
</html>
